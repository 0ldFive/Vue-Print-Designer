<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Component Test</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
    }
    .test-actions {
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 10px;
    }
    .test-actions button {
      padding: 5px 10px;
      cursor: pointer;
    }
    print-designer {
      display: block;
      width: 100%;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="test-actions">
      <button id="btn-refresh-templates">刷新模版列表 (refreshTemplates)</button>
      <button id="btn-refresh-elements">刷新自定义元素 (refreshCustomElements)</button>
      <button id="btn-delete-template">测试带 Confirm 删除模版 (deleteTemplate)</button>
      <button id="btn-modal-cases-guide">查看 Modal 用例步骤</button>
      <button id="btn-seed-permission-templates">注入权限模板</button>
      <button id="btn-load-readonly-template">加载只读模板</button>
      <button id="btn-test-paper-settings-readonly">测试页面设置只读模式</button>
      <button id="btn-try-upsert-readonly">测试只读模板更新拦截</button>
      <button id="btn-try-delete-readonly">测试只读模板删除拦截</button>
      <button id="btn-load-editable-template">加载可编辑模板</button>
      <button id="btn-seed-tag-templates">注入带标签模板</button>
      <button id="btn-test-global-loading">测试全局 Loading</button>
    </div>
  <!-- 加载设计器组件 -->
  <print-designer></print-designer>

  <script type="module">
    // 【开发模式】: 引入 src 源码，支持热更新（HMR），适合 npm run dev 时使用
    import { PrintDesignerElement } from '../src/web-component.ts';

    // 【生产模式】: 引入 dist 构建产物，适合测试最终打包后的效果
    // 要使用下面这行，请先执行 `npm run build:wc`，然后注释掉上面的源码引入
    // import { PrintDesignerElement } from '../dist/print-designer.es.js';
    // 并且如果是生产模式，别忘了引入 css 文件（在 head 中加入 <link rel="stylesheet" href="../dist/print-designer.css">）

    const designer = document.querySelector('print-designer');

    const initDesigner = () => {
      console.log('Designer is ready!');

      // 测试：1. 设置模版列表自定义菜单
      designer.setTemplateContextMenu({
        mode: 'append',
        items: [
          {
            key: 'copy',
            label: '自定义复制 (material-symbols)',
            actionKey: 'copy',
            icon: 'material-symbols:content-copy',
            eventName: 'custom-element-sync'
          },
          {
            key: 'custom-image',
            label: '外部图片 (测试)',
            iconImage: 'https://api.iconify.design/logos:vue.svg',
            eventName: 'custom-element-sync'
          }
        ]
      });

      // 测试：2. 设置自定义元素列表自定义菜单
      designer.setCustomElementContextMenu({
        mode: 'append',
        items: [
          {
            key: 'editElement',
            label: '编辑 (material-symbols)',
            actionKey: 'editElement',
            icon: 'material-symbols:edit'
          },
          {
            key: 'custom-sync',
            label: '同步到云端 (material-symbols)',
            icon: 'material-symbols:cloud-upload',
            eventName: 'custom-element-sync'
          }
        ]
      });

      // 测试：3. 通过 API 直接配置新建/重命名/复制 modal 的自定义表单
      designer.setTemplateModalForm({
        create: {
          fields: [
            { key: 'name', label: '名称', type: 'input', required: true, placeholder: '请输入名称' },
            {
              key: 'category',
              label: '分类',
              type: 'select',
              required: true,
              options: [
                { label: '标准', value: 'standard' },
                { label: '发货', value: 'shipment' },
                { label: '财务', value: 'finance' }
              ]
            },
            {
              key: 'scope',
              label: '可见范围',
              type: 'radio',
              required: true,
              options: [
                { label: '私有', value: 'private' },
                { label: '团队', value: 'team' }
              ]
            },
            { key: 'priority', label: '优先级', type: 'number', min: 1, max: 99, step: 1 },
            { key: 'remark', label: '备注', type: 'textarea', rows: 3, placeholder: '可选，测试 textarea' },
            { key: 'effectiveDate', label: '生效日期', type: 'date' },
            { key: 'publishAt', label: '发布时间', type: 'datetime' }
          ],
          initialValues: {
            category: 'standard',
            scope: 'private',
            priority: 1,
            remark: ''
          }
        },
        edit: {
          fields: [
            { key: 'name', label: '名称', type: 'input', required: true, placeholder: '请输入名称' },
            {
              key: 'scope',
              label: '可见范围',
              type: 'radio',
              required: true,
              options: [
                { label: '私有', value: 'private' },
                { label: '团队', value: 'team' }
              ]
            },
            { key: 'effectiveDate', label: '生效日期', type: 'date' }
          ]
        },
        copy: {
          fields: [
            { key: 'name', label: '名称', type: 'input', required: true, placeholder: '请输入名称' },
            {
              key: 'category',
              label: '分类',
              type: 'select',
              required: true,
              options: [
                { label: '标准', value: 'standard' },
                { label: '发货', value: 'shipment' }
              ]
            },
            { key: 'priority', label: '优先级', type: 'number', min: 1, max: 99, step: 1 },
            { key: 'publishAt', label: '发布时间', type: 'datetime' }
          ],
          initialValues: {
            category: 'standard',
            priority: 1
          }
        }
      });
    };

    // 监听设计器加载完成
    if (designer.isReady) {
      initDesigner();
    } else {
      designer.addEventListener('ready', initDesigner);
    }

    designer.addEventListener('custom-element-sync', (e) => {
      console.log('触发自定义元素同步事件:', e.detail);
      alert(`触发自定义元素同步事件：${e.detail.item.name}`);
    });

    document.getElementById('btn-refresh-templates').addEventListener('click', async () => {
      const list = await designer.refreshTemplates();
      console.log('刷新模版列表:', list);
      alert(`刷新完成，当前共有 ${list.length} 个模版`);
    });

    document.getElementById('btn-modal-cases-guide').addEventListener('click', () => {
      alert([
        'Modal 用例测试步骤：',
        '1) 先点击“注入权限模板”。',
        '2) 打开顶部模板下拉，点击“新建” -> 验证 input/select/radio/number/textarea/date/datetime 是否显示。',
        '3) 在某个可编辑模板右侧菜单点“重命名” -> 验证同样字段及保存逻辑。',
        '4) 在某个可复制模板右侧菜单点“复制” -> 验证同样字段及复制后模板是否置顶并自动切换。',
        '5) name 为空时确认按钮应不可点。'
      ].join('\n'));
    });

    document.getElementById('btn-refresh-elements').addEventListener('click', async () => {
      const list = await designer.refreshCustomElements();
      console.log('刷新自定义元素:', list);
      alert(`刷新完成，当前共有 ${list.length} 个自定义元素`);
    });

    document.getElementById('btn-delete-template').addEventListener('click', async () => {
      const list = designer.getTemplates();
      if (list.length > 0) {
        await designer.deleteTemplate(list[0].id); // 等待弹窗和删除完成
        // 删除后可以自动刷新一下列表
        const updated = await designer.refreshTemplates();
        console.log('删除后剩余模版数:', updated.length);
      } else {
        alert('当前没有模版可删除');
      }
    });

    document.getElementById('btn-seed-permission-templates').addEventListener('click', async () => {
      const readonlyTemplate = {
        id: 'tpl-readonly-system',
        name: '系统只读模板',
        editable: false,
        deletable: false,
        copyable: true,
        data: {
          pages: [
            {
              id: 'page-readonly',
              elements: []
            }
          ]
        }
      };

      const editableTemplate = {
        id: 'tpl-editable-demo',
        name: '可编辑模板',
        editable: true,
        deletable: true,
        copyable: true,
        data: {
          pages: [
            {
              id: 'page-editable',
              elements: []
            }
          ]
        }
      };

      designer.setTemplates([readonlyTemplate, editableTemplate], {
        currentTemplateId: readonlyTemplate.id
      });
      const list = designer.getTemplates({ includeData: true });
      console.log('已注入权限模板:', list);
      alert('已注入 1 个只读模板 + 1 个可编辑模板，并默认加载只读模板');
    });

    document.getElementById('btn-load-readonly-template').addEventListener('click', () => {
      const ok = designer.loadTemplate('tpl-readonly-system');
      alert(ok ? '已加载只读模板，可尝试拖拽/属性编辑验证 UI 禁用' : '加载失败，请先点击“注入权限模板”');
    });

    document.getElementById('btn-test-paper-settings-readonly').addEventListener('click', async () => {
      const ensureReadonlyTemplate = () => {
        const readonly = designer.getTemplate('tpl-readonly-system');
        const editable = designer.getTemplate('tpl-editable-demo');
        if (readonly && editable) return;
        designer.setTemplates([
          {
            id: 'tpl-readonly-system',
            name: '系统只读模板',
            editable: false,
            deletable: false,
            copyable: true,
            data: { pages: [{ id: 'page-readonly', elements: [] }] }
          },
          {
            id: 'tpl-editable-demo',
            name: '可编辑模板',
            editable: true,
            deletable: true,
            copyable: true,
            data: { pages: [{ id: 'page-editable', elements: [] }] }
          }
        ], { currentTemplateId: 'tpl-readonly-system' });
      };

      ensureReadonlyTemplate();
      designer.loadTemplate('tpl-readonly-system');
      await new Promise(resolve => setTimeout(resolve, 80));

      const root = designer.shadowRoot;
      if (!root) {
        alert('FAIL: 未找到组件 shadowRoot，无法执行自动检测');
        return;
      }

      const triggerButtons = Array.from(root.querySelectorAll('button[title="页面设置"],button[title="Paper Settings"]'));
      const allDisabled = triggerButtons.length > 0 && triggerButtons.every(btn => btn.disabled);

      // 尝试点击入口，确认不会展开页面设置面板
      triggerButtons[0]?.click();
      await new Promise(resolve => setTimeout(resolve, 80));
      const panel = root.querySelector('div.absolute.top-full.left-0.mt-2.w-64');
      const panelBlocked = !panel;

      const passed = allDisabled && panelBlocked;
      alert([
        passed ? 'PASS: 页面设置在只读模板下不可操作' : 'FAIL: 页面设置只读限制未生效',
        `入口按钮数: ${triggerButtons.length}`,
        `按钮均禁用: ${allDisabled ? '是' : '否'}`,
        `点击后未展开面板: ${panelBlocked ? '是' : '否'}`
      ].join('\n'));
    });

    document.getElementById('btn-load-editable-template').addEventListener('click', () => {
      const ok = designer.loadTemplate('tpl-editable-demo');
      alert(ok ? '已加载可编辑模板，可正常编辑' : '加载失败，请先点击“注入权限模板”');
    });

    document.getElementById('btn-seed-tag-templates').addEventListener('click', () => {
      const templateTagsOnly = {
        id: 'tpl-tag-only',
        name: '模板标签展示',
        ext: {
          templateTags: [
            { key: 'system', label: '系统', color: 'blue' },
            { key: 'whitelist', label: '白名单', color: 'white' },
            { key: 'urgent', label: '紧急', color: 'red' }
          ]
        },
        data: {
          pages: [{ id: 'page-tag-only', elements: [] }]
        }
      };

      designer.setTemplates([templateTagsOnly], {
        currentTemplateId: templateTagsOnly.id
      });

      alert([
        '已注入 1 个带标签的模板。',
        '请打开顶部模板下拉查看标签：',
        '直接读取 ext.templateTags 显示对应的系统、白名单和紧急标签。'
      ].join('\n'));
    });

    document.getElementById('btn-try-upsert-readonly').addEventListener('click', async () => {
      const result = await designer.upsertTemplate({
        id: 'tpl-readonly-system',
        name: '尝试修改只读模板名称'
      });
      const passed = result === null;
      console.log('只读模板 upsert 结果:', result, 'passed=', passed);
      alert(passed ? 'PASS: 只读模板更新被拦截（返回 null）' : `FAIL: 预期返回 null，实际为 ${String(result)}`);
    });

    document.getElementById('btn-try-delete-readonly').addEventListener('click', async () => {
      await designer.deleteTemplate('tpl-readonly-system', { confirm: false });
      const stillExists = designer.getTemplate('tpl-readonly-system');
      const passed = Boolean(stillExists);
      console.log('只读模板 delete 后是否仍存在:', passed);
      alert(passed ? 'PASS: 只读模板删除被拦截（模板仍存在）' : 'FAIL: 只读模板被删除了');
    });

    document.getElementById('btn-test-global-loading').addEventListener('click', async () => {
      if (designer._setGlobalLoading) {
        designer._setGlobalLoading(true);
        setTimeout(() => {
          designer._setGlobalLoading(false);
        }, 3000);
      }
    });

    // 注册组件（如果内部未自动注册）
    if (!customElements.get('print-designer')) {
      customElements.define('print-designer', PrintDesignerElement);
    }
  </script>
</body>
</html>
